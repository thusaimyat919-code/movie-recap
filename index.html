<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Translator PRO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
padding:0;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
background:white;
padding:20px;
border-radius:12px;
}

h1{
text-align:center;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4facfe;
color:white;
font-size:16px;
border:none;
}

.video-box{
margin-top:20px;
}

.subtitle{
background:#eee;
padding:15px;
margin-top:15px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Video Translator PRO</h1>

<input id="url" placeholder="Paste YouTube / TikTok / Facebook Link">

<select id="lang">
<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
<option>Spanish</option>
<option>French</option>
</select>

<button onclick="translateVideo()">Translate Video</button>

<div class="video-box">

<iframe
id="player"
width="100%"
height="300"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="subtitle" id="subtitle">
AI subtitle will appear here...
</div>

</div>

<script>

const API_KEY="YOUR_API_KEY"

async function aiTranslate(text){

let res = await fetch("https://api.openai.com/v1/responses",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-5-nano",
input:"Translate to Myanmar: "+text
})
})

let data = await res.json()

return data.output[0].content[0].text

}

async function translateVideo(){

let url=document.getElementById("url").value
let id=""

if(url.includes("watch?v=")){
id=url.split("watch?v=")[1]
}

if(url.includes("youtu.be/")){
id=url.split("youtu.be/")[1]
}

document.getElementById("player").src=
"https://www.youtube.com/embed/"+id

let text="This video is about technology and education."

let translated=await aiTranslate(text)

document.getElementById("subtitle").innerHTML=translated

}

</script>

</body>
</html>
