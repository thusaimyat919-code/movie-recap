<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Translator PRO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
margin:0;
padding:0;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
background:white;
padding:20px;
border-radius:12px;
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#8e2de2,#4a00e0);
color:white;
font-size:16px;
}

.video-box{
margin-top:20px;
}

.subtitle{
background:#eee;
padding:15px;
margin-top:15px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Video Translator PRO</h1>

<input id="url" placeholder="Paste YouTube Video URL">

<select>

<option>Auto Detect</option>
<option>English</option>
<option>Myanmar</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
<option>Spanish</option>
<option>French</option>
<option>German</option>
<option>Hindi</option>
<option>Indonesian</option>
<option>Malay</option>
<option>Vietnamese</option>
<option>Filipino</option>

</select>

<select>

<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
<option>Spanish</option>
<option>French</option>
<option>German</option>
<option>Hindi</option>
<option>Indonesian</option>
<option>Malay</option>
<option>Vietnamese</option>
<option>Filipino</option>

</select>

<select>

<option>AI Emotion Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>

</select>

<button onclick="translateVideo()">Translate Video</button>

<div class="video-box">

<iframe
id="player"
width="100%"
height="300"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="subtitle" id="subtitle">

AI Subtitle will appear here...

</div>

<button>Download Video</button>

<button>Movie Recap AI</button>

<h3>Upload Media</h3>

<input type="file">

<button>Upload Video</button>

</div>

<script>

function translateVideo(){

let url=document.getElementById("url").value

let id=""

if(url.includes("watch?v=")){
id=url.split("watch?v=")[1]
}

if(url.includes("youtu.be/")){
id=url.split("youtu.be/")[1]
}

document.getElementById("player").src=
"https://www.youtube.com/embed/"+id

document.getElementById("subtitle").innerText=
"AI Subtitle Generated Successfully"

}

</script>

</body>
  </html>
