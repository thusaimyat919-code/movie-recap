<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Translator PRO</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4a00e0,#8e2de2);
margin:0;
padding:0;
}

.container{
width:90%;
max-width:600px;
background:white;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:0.9;
}

.video-box{
width:100%;
height:300px;
background:black;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

video{
width:100%;
height:100%;
}

.subtitle{
background:#eee;
padding:15px;
margin-top:15px;
border-radius:8px;
font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Video Translator PRO</h1>

<input type="text" id="url" placeholder="Paste YouTube Video URL">

<select id="language">
<option value="auto">Auto Detect</option>
<option value="my">Myanmar</option>
<option value="en">English</option>
<option value="th">Thai</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="hi">Hindi</option>
<option value="id">Indonesian</option>
<option value="ms">Malay</option>
<option value="ru">Russian</option>
<option value="pt">Portuguese</option>
<option value="it">Italian</option>
<option value="tr">Turkish</option>
<option value="ar">Arabic</option>
<option value="bn">Bengali</option>
<option value="vi">Vietnamese</option>
</select>

<select id="voice">
<option>AI Emotion Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<button onclick="translateVideo()">Translate Video</button>

<div class="video-box">
<video id="videoPlayer" controls></video>
</div>

<div class="subtitle" id="subtitle">
AI Myanmar Subtitle will appear here...
</div>

<button onclick="downloadVideo()">Download Video</button>

<button onclick="movieRecap()">Movie Recap AI</button>

<h3>Upload Media</h3>

<input type="file" id="upload">

<button onclick="uploadVideo()">Upload Video</button>

</div>

<script>

function translateVideo(){

let url=document.getElementById("url").value

if(url==""){
alert("Paste Video URL")
return
}

let video=document.getElementById("videoPlayer")

video.src=url

document.getElementById("subtitle").innerText=
"AI Translating Video... Myanmar Subtitle Generated"

}

function downloadVideo(){

alert("Video Download Feature Coming Soon")

}

function movieRecap(){

alert("AI Movie Recap Generating...")

}

function uploadVideo(){

let file=document.getElementById("upload").files[0]

if(!file){
alert("Choose Video File")
return
}

let video=document.getElementById("videoPlayer")

video.src=URL.createObjectURL(file)

document.getElementById("subtitle").innerText=
"AI Subtitle Generated From Uploaded Video"

}

</script>

</body>
</html>
