<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Translator PRO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:20px;
border-radius:12px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#7b2ff7;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:100%;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#5f1fd6;
}

video{
width:100%;
margin-top:15px;
border-radius:10px;
}

.subtitle{
margin-top:10px;
background:#f2f2f2;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>AI Video Translator PRO</h2>

<input id="youtubeLink" placeholder="Paste YouTube Link">

<select id="sourceLang">
<option>Auto Detect</option>
<option>English</option>
<option>Thai</option>
<option>Myanmar</option>
<option>Chinese</option>
</select>

<select id="targetLang">
<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
<option>Chinese</option>
</select>

<select>
<option>AI Emotion Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<button onclick="translateVideo()">Translate Video</button>

<br><br>

<h4>Upload Media</h4>

<input type="file" id="videoUpload" accept="video/*">

<button onclick="uploadVideo()">Upload Video</button>

<div id="videoBox"></div>

<div class="subtitle" id="subtitleBox">
AI Subtitle will appear here
</div>

<button onclick="downloadVideo()">Download Video</button>

<button onclick="movieRecap()">Movie Recap AI</button>

</div>

<script>

function translateVideo(){

let link=document.getElementById("youtubeLink").value

if(link==""){
alert("Paste YouTube Link")
return
}

let videoId=link.split("v=")[1]

if(link.includes("shorts")){
videoId=link.split("shorts/")[1]
}

let embed="https://www.youtube.com/embed/"+videoId

document.getElementById("videoBox").innerHTML=

'<iframe width="100%" height="200" src="'+embed+'" frameborder="0" allowfullscreen></iframe>'

document.getElementById("subtitleBox").innerHTML=
"AI Subtitle (Myanmar): This is AI generated subtitle demo."

}

function uploadVideo(){

let file=document.getElementById("videoUpload").files[0]

if(!file){
alert("Select Video First")
return
}

let url=URL.createObjectURL(file)

document.getElementById("videoBox").innerHTML=
'<video controls src="'+url+'"></video>'

document.getElementById("subtitleBox").innerHTML=
"AI Subtitle Generated from uploaded video (Demo)."

}

function downloadVideo(){

alert("Video Download Feature Demo")

}

function movieRecap(){

alert("Movie Recap AI: This video is about soldiers on a mission.")

}

</script>

</body>
</html>
