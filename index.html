<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Translator PRO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(45deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:25px;
width:340px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#7b2ff7;
color:white;
border:none;
font-weight:bold;
}

button:hover{
background:#5f1edb;
}

video,iframe{
width:100%;
margin-top:15px;
border-radius:10px;
}

.subtitle{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:8px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>AI Video Translator PRO</h2>

<input id="youtubeLink" placeholder="Paste YouTube Link">

<select>
<option>Auto Detect</option>
<option>English</option>
<option>Chinese</option>
<option>Thai</option>
</select>

<select>
<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
</select>

<select>
<option>AI Emotion Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<button onclick="translateVideo()">Translate Video</button>

<div id="videoBox"></div>

<div id="subtitleBox" class="subtitle">
AI Subtitle will appear here
</div>

<button onclick="downloadVideo()">Download Video</button>

<button onclick="movieRecap()">Movie Recap AI</button>

<h3>Upload Media</h3>

<input type="file" id="videoUpload">

<button onclick="uploadVideo()">Upload Video</button>

</div>

<script>

function translateVideo(){

let link=document.getElementById("youtubeLink").value

if(link==""){
alert("Paste YouTube Link")
return
}

let id=""

if(link.includes("watch?v=")){
id=link.split("v=")[1]
}

if(link.includes("shorts/")){
id=link.split("shorts/")[1]
}

let embed="https://www.youtube.com/embed/"+id

document.getElementById("videoBox").innerHTML=
'<iframe src="'+embed+'" frameborder="0" allowfullscreen></iframe>'

document.getElementById("subtitleBox").innerHTML=
"AI Myanmar Subtitle: ဒီဗီဒီယိုမှာ လူတစ်ယောက် ပြန်လာတာကို မေးနေပါတယ်။"

}

function uploadVideo(){

let file=document.getElementById("videoUpload").files[0]

if(!file){
alert("Choose Video")
return
}

let url=URL.createObjectURL(file)

document.getElementById("videoBox").innerHTML=
'<video controls src="'+url+'"></video>'

document.getElementById("subtitleBox").innerHTML=
"AI Subtitle Generated from Uploaded Video"

}

function downloadVideo(){
alert("Download feature coming soon")
}

function movieRecap(){
document.getElementById("subtitleBox").innerHTML=
"Movie Recap: ဒီဇာတ်ကားမှာ လူတစ်ယောက်အိမ်ထဲမှာနားနေတဲ့အချိန် သူ့ကိုတစ်ယောက်လာတွေ့ပါတယ်။"
}

</script>

</body>
</html>
