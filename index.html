<!DOCTYPE html>
<html>
<head>
<title>AI Video Translator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:350px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:purple;
color:white;
border:none;
}

iframe{
margin-top:20px;
width:100%;
height:200px;
}

</style>

</head>

<body>

<div class="box">

<h2>AI Video Translator</h2>

<input id="url" placeholder="Paste YouTube link">

<select id="lang">
<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
</select>

<button onclick="loadVideo()">Translate</button>

<div id="video"></div>

</div>

<script>

function loadVideo(){

let link = document.getElementById("url").value;

if(link==""){
alert("Paste video link");
return;
}

let id="";

if(link.includes("shorts")){
id=link.split("/shorts/")[1];
}else{
id=link.split("v=")[1];
}

document.getElementById("video").innerHTML=
'<iframe src="https://www.youtube.com/embed/'+id+'"></iframe>';

}

</script>

</body>
</html>
