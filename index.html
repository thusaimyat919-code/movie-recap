<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Translator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:0;
}

.container{
width:90%;
max-width:700px;
margin:auto;
margin-top:40px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#5563c1;
}

.video-box{
margin-top:20px;
}

.subtitle{
margin-top:20px;
background:#f1f1f1;
padding:15px;
border-radius:10px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Video Translator</h1>

<input id="url" placeholder="Paste YouTube / TikTok / Facebook link">

<select id="lang">
<option value="Myanmar">Myanmar</option>
<option value="English">English</option>
<option value="Thai">Thai</option>
<option value="Chinese">Chinese</option>
<option value="Japanese">Japanese</option>
<option value="Korean">Korean</option>
</select>

<button onclick="loadVideo()">Load Video</button>
<button onclick="translateSubtitle()">Translate Subtitle</button>

<div class="video-box">

<iframe
id="player"
width="100%"
height="350"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="subtitle" id="subtitle">
Subtitle will appear here...
</div>

</div>

<script>

const API_KEY="YOUR_API_KEY"

function loadVideo(){

let url=document.getElementById("url").value
let embed=""

if(url.includes("youtube.com") || url.includes("youtu.be")){

let id=""

if(url.includes("watch?v=")){
id=url.split("watch?v=")[1]
}

if(url.includes("youtu.be/")){
id=url.split("youtu.be/")[1]
}

embed="https://www.youtube.com/embed/"+id

}

else if(url.includes("tiktok")){
embed=url
}

else if(url.includes("facebook")){
embed=url
}

document.getElementById("player").src=embed

}

async function translateSubtitle(){

let lang=document.getElementById("lang").value

let text="This video is explaining technology and learning."

let response=await fetch("https://api.openai.com/v1/responses",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:"gpt-5-nano",

input:"Translate this to "+lang+": "+text

})

})

let data=await response.json()

let result=data.output[0].content[0].text

document.getElementById("subtitle").innerHTML=result

}

</script>

</body>
</html>
