<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Translator</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

h1{
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

iframe{
margin-top:20px;
width:100%;
height:200px;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Video Translator</h1>

<input id="videoUrl" placeholder="Paste YouTube link">

<select id="language">

<option value="my">Myanmar</option>
<option value="en">English</option>
<option value="th">Thai</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>

</select>

<button onclick="translateVideo()">Translate Video</button>

<div id="player"></div>

</div>

<script>

function translateVideo(){

let url = document.getElementById("videoUrl").value;

if(url==""){
alert("Paste YouTube link");
return;
}

let id = "";

if(url.includes("shorts")){
id = url.split("/shorts/")[1];
}else{
id = url.split("v=")[1];
}

document.getElementById("player").innerHTML =
'<iframe src="https://www.youtube.com/embed/'+id+'"></iframe>';

}

</script>

</body>
</html>
