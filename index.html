<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra AI Video Translator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:380px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin:7px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#6a11cb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4c0dbd;
}

.video{
margin-top:20px;
}

.subtitle{
margin-top:15px;
background:#f3f3f3;
padding:10px;
border-radius:8px;
font-size:14px;
}

.loader{
display:none;
margin-top:10px;
}

.feature{
text-align:left;
margin-top:15px;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Video Translator PRO</h2>

<input id="videoURL" placeholder="Paste YouTube Link">

<select id="sourceLang">
<option>Auto Detect</option>
<option>English</option>
<option>Myanmar</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
<option>Spanish</option>
<option>French</option>
</select>

<select id="targetLang">
<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
<option>Spanish</option>
<option>French</option>
</select>

<select id="voice">
<option>AI Emotion Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<button onclick="translateVideo()">Translate Video</button>

<div class="loader" id="loading">
 AI Processing Video...
</div>

<div class="video" id="videoPlayer"></div>

<div class="subtitle" id="subtitle"></div>

<button onclick="downloadVideo()">Download Video</button>

<button onclick="movieRecap()">Movie Recap AI</button>

<div class="feature">

 Real AI Subtitle  
 AI Voice Dub  
 Video Download  
 170 Languages  
 Movie Recap AI  
 APK Android App  

</div>

</div>

<script>

function getVideoId(url){

if(url.includes("shorts/")){
return url.split("shorts/")[1].split("?")[0]
}

if(url.includes("watch?v=")){
return url.split("watch?v=")[1].split("&")[0]
}

return null
}

function translateVideo(){

let url=document.getElementById("videoURL").value
let id=getVideoId(url)

if(!id){
alert("Invalid YouTube Link")
return
}

document.getElementById("loading").style.display="block"

setTimeout(function(){

let embed="https://www.youtube.com/embed/"+id

document.getElementById("videoPlayer").innerHTML=
'<iframe width="330" height="200" src="'+embed+'" frameborder="0" allowfullscreen></iframe>'

let lang=document.getElementById("targetLang").value

document.getElementById("subtitle").innerHTML=
"<b>AI Subtitle ("+lang+")</b><br><br>This is AI generated subtitle translation demo."

document.getElementById("loading").style.display="none"

},2000)

}

function downloadVideo(){

alert("Video Download Feature (Server Required)")

}

function movieRecap(){

document.getElementById("subtitle").innerHTML=
"<b>Movie Recap AI</b><br><br>This video shows a short story summary generated by AI."

}

</script>

</body>
</html>
