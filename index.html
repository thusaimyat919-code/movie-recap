<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Translator Pro</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#6a11cb;
color:white;
font-size:16px;
border:none;
cursor:pointer;
}

button:hover{
background:#4b0fa3;
}

iframe{
margin-top:20px;
width:100%;
height:220px;
border:none;
border-radius:8px;
}

.result{
margin-top:15px;
font-size:14px;
color:#333;
}

</style>
</head>

<body>

<div class="container">

<h2>AI Video Translator</h2>

<input id="url" placeholder="Paste YouTube Video Link">

<select id="source">
<option>Auto Detect</option>
<option>English</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
</select>

<select id="target">
<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
</select>

<select>
<option>Voice Style</option>
<option>Male Voice</option>
<option>Female Voice</option>
<option>AI Emotion Voice</option>
</select>

<button onclick="translateVideo()">Translate Video</button>

<div id="video"></div>
<div class="result" id="result"></div>

</div>

<script>

function translateVideo(){

let link=document.getElementById("url").value;
let target=document.getElementById("target").value;

if(link==""){
alert("Paste video link");
return;
}

let id="";

if(link.includes("shorts")){
id=link.split("/shorts/")[1];
}else if(link.includes("v=")){
id=link.split("v=")[1];
}else{
alert("Invalid link");
return;
}

document.getElementById("video").innerHTML=
'<iframe src="https://www.youtube.com/embed/'+id+'"></iframe>';

document.getElementById("result").innerHTML=
"AI translating video to "+target+" language...";

}

</script>

</body>
</html>
