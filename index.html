<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AI Video Translator PRO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:0;
}

.container{
width:90%;
max-width:800px;
margin:auto;
margin-top:30px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#5563c1;
}

.video{
margin-top:20px;
}

.subtitle{
margin-top:20px;
background:#f2f2f2;
padding:15px;
border-radius:10px;
min-height:50px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Video Translator PRO</h1>

<input id="url" placeholder="Paste YouTube Link">

<select id="lang">

<option value="Myanmar">Myanmar</option>
<option value="English">English</option>
<option value="Thai">Thai</option>
<option value="Chinese">Chinese</option>
<option value="Japanese">Japanese</option>
<option value="Korean">Korean</option>

</select>

<button onclick="loadVideo()">Load Video</button>

<button onclick="translateSubtitle()">Translate Subtitle</button>

<div class="video">

<iframe
id="player"
width="100%"
height="400"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="subtitle" id="subtitle">

Subtitle will appear here...

</div>

</div>

<script>

const API_KEY="YOUR_API_KEY"

function getYouTubeID(url){

let id=""

if(url.includes("watch?v=")){
id=url.split("watch?v=")[1]
}

else if(url.includes("youtu.be/")){
id=url.split("youtu.be/")[1]
}

else if(url.includes("shorts/")){
id=url.split("shorts/")[1]
}

if(id.includes("&")){
id=id.split("&")[0]
}

return id

}

function loadVideo(){

let url=document.getElementById("url").value

let id=getYouTubeID(url)

let embed="https://www.youtube.com/embed/"+id

document.getElementById("player").src=embed

}

async function translateSubtitle(){

let lang=document.getElementById("lang").value

let text="This video explains a story about a woman trapped with an alien."

let response=await fetch("https://api.openai.com/v1/responses",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:"gpt-5-nano",

input:"Translate this text to "+lang+": "+text

})

})

let data=await response.json()

let result=data.output[0].content[0].text

document.getElementById("subtitle").innerHTML=result

}

</script>

</body>

</html>
