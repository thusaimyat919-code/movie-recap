<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Translator</title>

<style>
body{
font-family:Arial;
background:linear-gradient(45deg,#6a11cb,#ff00cc);
color:white;
text-align:center;
padding:30px;
}

.container{
background:white;
color:black;
max-width:500px;
margin:auto;
padding:20px;
border-radius:10px;
}

input,select,button{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
background:#ff00cc;
color:white;
border:none;
border-radius:8px;
}

#result{
margin-top:20px;
background:#f1f1f1;
padding:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Video Translator</h2>

<input type="file" id="video">

<p>OR</p>

<input type="text" id="link" placeholder="Paste YouTube / TikTok / Facebook link">

<h3>Target Language</h3>

<select id="target">

<option value="my">Myanmar</option>
<option value="en">English</option>
<option value="th">Thai</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="hi">Hindi</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="ru">Russian</option>
<option value="pt">Portuguese</option>
<option value="ar">Arabic</option>
<option value="id">Indonesian</option>
<option value="vi">Vietnamese</option>
<option value="ms">Malay</option>

</select>

<button onclick="translateVideo()">Translate</button>

<div id="result">
Translation result will appear here
</div>

</div>

<script>

function translateVideo(){

let file=document.getElementById("video").files[0];
let link=document.getElementById("link").value;
let lang=document.getElementById("target").value;

if(!file && !link){
alert("Upload video or paste link");
return;
}

document.getElementById("result").innerHTML="Processing AI Translation...";

setTimeout(()=>{

document.getElementById("result").innerHTML=
" Translation Complete<br><br>Target Language: "+lang+"<br><br>Subtitle Generated";

},3000);

}

</script>

</body>
</html>
