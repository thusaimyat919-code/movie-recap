<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Translator PRO</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#4f46e5,#9333ea);
}

.container{
max-width:600px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#7c3aed,#6d28d9);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#player{
width:100%;
height:315px;
margin-top:10px;
}

.status{
background:#eee;
padding:10px;
border-radius:6px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Video Translator PRO</h1>

<input id="youtubeUrl" placeholder="Paste YouTube URL">

<select id="sourceLang">
<option>Auto Detect</option>
<option>English</option>
<option>Thai</option>
<option>Japanese</option>
<option>Korean</option>
<option>Chinese</option>
</select>

<select id="targetLang">
<option>Myanmar</option>
<option>English</option>
<option>Thai</option>
<option>Japanese</option>
<option>Korean</option>
<option>Chinese</option>
</select>

<select id="voice">
<option>AI Emotion Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<button onclick="translateVideo()">Translate Video</button>

<iframe id="player"></iframe>

<div class="status" id="status">
Waiting Video...
</div>

<button onclick="downloadVideo()">Download Video</button>

<button onclick="movieRecap()">Movie Recap AI</button>

<h3>Upload Media</h3>

<input type="file" id="upload">

<button onclick="uploadVideo()">Upload Video</button>

</div>

<script>

function getYoutubeID(url){
let reg=/v=([^&]+)/;
let match=url.match(reg);
if(match){
return match[1];
}
return null;
}

function translateVideo(){

let url=document.getElementById("youtubeUrl").value;

let id=getYoutubeID(url);

if(!id){
alert("Invalid YouTube Link");
return;
}

document.getElementById("player").src=
"https://www.youtube.com/embed/"+id;

document.getElementById("status").innerHTML=
"AI Subtitle Generated Successfully";
}

function downloadVideo(){
alert("Video Download Feature Coming Soon");
}

function movieRecap(){
alert("Movie Recap AI Generating...");
}

function uploadVideo(){

let file=document.getElementById("upload").files[0];

if(!file){
alert("Select Video First");
return;
}

document.getElementById("status").innerHTML=
"Video Uploaded: "+file.name;

}

</script>

</body>
</html>
