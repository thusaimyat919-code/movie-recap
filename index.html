<!DOCTYPE html>
<html>
<head>
<title>AI Video Translator</title>
<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.box{
background:white;
padding:20px;
margin:50px auto;
width:350px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
background:purple;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
}

input,select{
width:90%;
padding:8px;
margin:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>AI Video Translator</h2>

<input type="file">

<select>
<option>Auto Detect Language</option>
<option>English</option>
<option>Thai</option>
<option>Myanmar</option>
</select>

<select>
<option>Select Target Language</option>
<option>English</option>
<option>Thai</option>
<option>Myanmar</option>
</select>

<select>
<option>Voice Style</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<br><br>

<button>Submit</button>

</div>

</body>
</html>
